<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyTales - Your Story Adventure</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Chalkboard', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #e94560;
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    
    .device {
      background: #1a1a2e;
      border-radius: 50%;
      width: 200px;
      height: 200px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 10px 40px rgba(233, 69, 96, 0.3);
    }
    
    .led-ring {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid #333;
      animation: pulse 2s infinite;
    }
    
    .led-ring.listening {
      border-color: #00ff88;
      box-shadow: 0 0 30px #00ff88;
    }
    
    .led-ring.speaking {
      border-color: #e94560;
      box-shadow: 0 0 30px #e94560;
    }
    
    .led-ring.thinking {
      border-color: #ffd700;
      box-shadow: 0 0 30px #ffd700;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    .mic-icon {
      font-size: 60px;
    }
    
    .story-text {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      min-height: 150px;
      text-align: left;
      font-size: 1.2em;
      line-height: 1.6;
      color: #333;
      border: 3px solid #e94560;
    }
    
    .btn {
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 1.3em;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 10px;
    }
    
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
    }
    
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-secondary {
      background: linear-gradient(135deg, #4a4a4a, #666);
    }
    
    .status {
      margin-top: 20px;
      color: #666;
      font-size: 0.9em;
    }
    
    .hidden { display: none; }
    
    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    
    .choice-btn {
      background: linear-gradient(135deg, #00b894, #00cec9);
      padding: 12px 25px;
      font-size: 1em;
    }
    
    .settings-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      border: none;
      font-size: 24px;
      cursor: pointer;
      border-radius: 50%;
      width: 44px;
      height: 44px;
    }
    
    .settings-panel {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      text-align: left;
    }
    
    .settings-panel label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }
    
    .settings-panel input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 15px;
    }
    
    .settings-panel .btn-save {
      background: linear-gradient(135deg, #00b894, #00cec9);
      padding: 10px 25px;
      font-size: 1em;
    }
      background: #ffe6e6;
      color: #cc0000;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
  
  <div class="container">
    <div class="settings-panel hidden" id="settingsPanel">
      <h3>⚙️ Settings</h3>
      <label for="apiKey">OpenAI API Key:</label>
      <input type="password" id="apiKey" placeholder="sk-proj-...">
      <p style="font-size: 0.8em; color: #666; margin-bottom: 15px;">Your key is stored locally in your browser and never sent to any server.</p>
      <button class="btn btn-save" id="saveApiKey">Save Key</button>
    </div>
    
    <h1>✨ TinyTales</h1>
    <p class="subtitle">Choose your adventure and talk to the story!</p>
    
    <div class="device">
      <div class="led-ring" id="led"></div>
      <div class="mic-icon" id="micIcon">🔊</div>
    </div>
    
    <div class="story-text" id="storyText">
      Press the button below to start your adventure!
    </div>
    
    <div id="errorDiv" class="error hidden"></div>
    
    <div>
      <button class="btn" id="startBtn">🎤 Start Adventure</button>
      <button class="btn btn-secondary hidden" id="stopBtn">⏹️ Stop</button>
    </div>
    
    <div class="choices hidden" id="choices"></div>
    
    <p class="status" id="status">Ready to play!</p>
  </div>

  <script>
    const storyText = document.getElementById('storyText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const led = document.getElementById('led');
    const status = document.getElementById('status');
    const choicesDiv = document.getElementById('choices');
    const micIcon = document.getElementById('micIcon');
    const errorDiv = document.getElementById('errorDiv');
    
    // OpenAI API key - loaded from localStorage
    let OPENAI_API_KEY = localStorage.getItem('tinytales_api_key') || '';
    
    // Settings panel
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const apiKeyInput = document.getElementById('apiKey');
    const saveApiKeyBtn = document.getElementById('saveApiKey');
    
    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('hidden');
      if (!settingsPanel.classList.contains('hidden')) {
        apiKeyInput.value = OPENAI_API_KEY;
      }
    });
    
    saveApiKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        localStorage.setItem('tinytales_api_key', key);
        OPENAI_API_KEY = key;
        settingsPanel.classList.add('hidden');
        alert('API key saved! Ready to play.');
      }
    });
    
    // Check if API key is set
    if (!OPENAI_API_KEY) {
      showError('Please add your OpenAI API key in Settings (⚙️) to play the story.');
    }
    
    let recognition;
    let currentStory = '';
    let storyContext = '';
    let isListening = false;
    
    // Check for browser speech recognition support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
      showError('Sorry! Your browser doesn\'t support voice. Try Chrome or Edge on desktop, or Safari on iOS.');
      startBtn.disabled = true;
    }
    
    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
    }
    
    function hideError() {
      errorDiv.classList.add('hidden');
    }
    
    // Initialize speech recognition
    function initRecognition() {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      
      recognition.onstart = () => {
        isListening = true;
        status.textContent = 'Listening...';
        led.classList.add('listening');
        micIcon.textContent = '🎤';
      };
      
      recognition.onresult = (event) => {
        const transcript = Array.from(event.results)
          .map(result => result[0].transcript)
          .join('');
        status.textContent = 'You said: ' + transcript;
        
        // Auto-stop after we get a result
        if (event.results[0].isFinal) {
          setTimeout(() => {
            recognition.stop();
          }, 500);
        }
      };
      
      recognition.onend = () => {
        isListening = false;
        led.classList.remove('listening');
        micIcon.textContent = '🔊';
      };
      
      recognition.onerror = (event) => {
        isListening = false;
        led.classList.remove('listening');
        micIcon.textContent = '🔊';
        
        if (event.error === 'no-speech') {
          status.textContent = 'Didn\'t hear anything. Try again!';
        } else if (event.error === 'not-allowed') {
          showError('Microphone access denied. Please allow microphone access in your browser settings.');
        } else {
          status.textContent = 'Error: ' + event.error;
        }
      };
    }
    
    // Text to speech using browser API
    function speak(text) {
      led.classList.add('speaking');
      micIcon.textContent = '🗣️';
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.pitch = 1.1;
      
      // Try to find a friendly voice
      const voices = speechSynthesis.getVoices();
      const friendlyVoice = voices.find(v => 
        v.name.includes('Samantha') || 
        v.name.includes('English') || 
        v.name.includes('Google UK English Female')
      );
      if (friendlyVoice) {
        utterance.voice = friendlyVoice;
      }
      
      utterance.onend = () => {
        led.classList.remove('speaking');
        micIcon.textContent = '🔊';
        status.textContent = 'Your turn! Tap a choice or press the button to continue.';
        
        // If we have choices, show them
        if (choicesDiv.querySelectorAll('.choice-btn').length > 0) {
          choicesDiv.classList.remove('hidden');
        }
      };
      
      utterance.onerror = () => {
        led.classList.remove('speaking');
        micIcon.textContent = '🔊';
      };
      
      speechSynthesis.speak(utterance);
      storyText.textContent = text;
    }
    
    // Generate story with OpenAI
    async function generateStory(prompt) {
      led.classList.add('thinking');
      status.textContent = 'Thinking...';
      hideError();
      
      const systemPrompt = `You are telling a magical adventure story to a child (ages 5-10). 
Keep it exciting but not scary. Make it interactive by giving 2-3 choices at the end.
Format: Tell the story part (2-3 short paragraphs), then end with "What do you want to do?" and list choices starting with "1)", "2)", "3)".
Make the story feel warm and magical.`;
      
      const userPrompt = storyContext 
        ? `Continue the story: ${currentStory}\n\nThe child chose: ${prompt}\n\nContinue the adventure!`
        : `Start a new adventure story. Begin with: "You are walking through a mysterious forest when you discover a glowing door hidden behind some bushes. The door has strange symbols carved into it."\n\nContinue from there and give choices.`;
      
      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ],
            max_tokens: 500
          })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || 'API Error: ' + response.status);
        }
        
        const data = await response.json();
        const story = data.choices[0].message.content;
        
        currentStory = story;
        storyContext += userPrompt;
        
        speak(story);
        parseAndShowChoices(story);
        
      } catch (error) {
        console.error('Story generation error:', error);
        showError('Oops! Something went wrong: ' + error.message);
        status.textContent = 'Try again!';
        led.classList.remove('thinking');
      } finally {
        led.classList.remove('thinking');
      }
    }
    
    // Parse choices from story and show buttons
    function parseAndShowChoices(story) {
      choicesDiv.innerHTML = '';
      const lines = story.split('\n');
      
      lines.forEach(line => {
        if (line.match(/^\d+\)/)) {
          const choiceText = line.replace(/^\d+\)\s*/, '').trim();
          if (choiceText.length > 0) {
            const btn = document.createElement('button');
            btn.className = 'btn choice-btn';
            btn.textContent = choiceText;
            btn.onclick = () => {
              choicesDiv.classList.add('hidden');
              generateStory(choiceText);
            };
            choicesDiv.appendChild(btn);
          }
        }
      });
    }
    
    // Start button handler
    startBtn.addEventListener('click', () => {
      if (!OPENAI_API_KEY) {
        settingsPanel.classList.remove('hidden');
        showError('Please add your OpenAI API key in Settings (⚙️) first.');
        return;
      }
      
      hideError();
      initRecognition();
      
      if (!storyContext) {
        // Fresh story
        generateStory('');
      } else {
        // Continue - start listening
        status.textContent = 'Listening for your choice...';
        led.classList.add('listening');
        try {
          recognition.start();
        } catch(e) {
          // Already started
        }
      }
      
      startBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');
    });
    
    // Stop button handler
    stopBtn.addEventListener('click', () => {
      if (recognition && isListening) {
        recognition.stop();
      }
      speechSynthesis.cancel();
      led.classList.remove('listening', 'speaking', 'thinking');
      startBtn.classList.remove('hidden');
      stopBtn.classList.add('hidden');
      choicesDiv.classList.add('hidden');
      status.textContent = 'Ready to play!';
      hideError();
    });
  </script>
</body>
</html>
